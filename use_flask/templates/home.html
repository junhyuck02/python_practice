<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Scrapper</title>
  </head>
  <body>
    <h1>Job Scrapper</h1>
    <h4>What job do you want?</h4>
    <form action="/search">
      <!-- search 주소로 이동 -->
      <input type="text" nam="keyword" placeholder="Write keyword please" />
      <!-- input에 name을 넣어야하는 이유: name의 keyword가 url에 보이게됨-->
      <button>Search</button>
    </form>
  </body>
</html>
